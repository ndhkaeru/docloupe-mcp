name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.2.3'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release tests
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout source overlay
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source-overlay

      - name: Apply source overlay
        shell: pwsh
        run: Copy-Item -Recurse -Force source-overlay/servers/* servers/

      - name: Validate source overlay
        shell: pwsh
        run: |
          $required = @(
            'servers/excel/excel_converter.py',
            'servers/pdf/converter.py',
            'servers/docx/converter.py',
            'servers/docx/markdownify_helper.py',
            'servers/docx/converter_utils',
            'servers/pptx/converter.py',
            'servers/pptx/markdownify_helper.py',
            'servers/csv/converter.py',
            'servers/html/converter.py',
            'servers/html/markdownify_helper.py',
            'servers/text/converter.py',
            'servers/json/converter.py'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count) { throw "Source overlay is incomplete: $($missing -join ', ')" }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv-build
          .\.venv-build\Scripts\python.exe -m pip install -U pip
          .\.venv-build\Scripts\python.exe -m pip install pytest pyinstaller "mcp[cli]" openpyxl pillow pdfminer.six pdfplumber mammoth python-pptx markdownify beautifulsoup4 lxml defusedxml charset-normalizer

      - name: Run tests
        shell: pwsh
        run: .\.venv-build\Scripts\python.exe -m pytest -q

  build:
    name: Build ${{ matrix.platform }} executables
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-15-intel
            platform: macos-x64
          - os: macos-14
            platform: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout source overlay
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source-overlay

      - name: Apply source overlay
        shell: pwsh
        run: Copy-Item -Recurse -Force source-overlay/servers/* servers/

      - name: Validate source overlay
        shell: pwsh
        run: |
          $required = @(
            'servers/excel/excel_converter.py',
            'servers/pdf/converter.py',
            'servers/docx/converter.py',
            'servers/docx/markdownify_helper.py',
            'servers/docx/converter_utils',
            'servers/pptx/converter.py',
            'servers/pptx/markdownify_helper.py',
            'servers/csv/converter.py',
            'servers/html/converter.py',
            'servers/html/markdownify_helper.py',
            'servers/text/converter.py',
            'servers/json/converter.py'
          )
          $missing = @($required | Where-Object { -not (Test-Path -LiteralPath $_) })
          if ($missing.Count) { throw "Source overlay is incomplete: $($missing -join ', ')" }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m venv .venv-build
          $py = if (Test-Path ".venv-build/Scripts/python.exe") { ".venv-build/Scripts/python.exe" } else { ".venv-build/bin/python" }
          & $py -m pip install -U pip
          & $py -m pip install pytest pyinstaller "mcp[cli]" openpyxl pillow pdfminer.six pdfplumber mammoth python-pptx markdownify beautifulsoup4 lxml defusedxml charset-normalizer

      - name: Build all servers
        shell: pwsh
        run: |
          $py = if (Test-Path ".venv-build/Scripts/python.exe") { ".venv-build/Scripts/python.exe" } else { ".venv-build/bin/python" }
          $servers = @(
            @{ name = "excel-tools"; entry = "servers/excel/main.py"; paths = "servers/excel"; hidden = @("excel_converter"); excludes = @("numpy", "lxml") },
            @{ name = "pdf-tools";   entry = "servers/pdf/main.py";   paths = "servers/pdf"; hidden = @("converter") },
            @{ name = "docx-tools";  entry = "servers/docx/main.py";  paths = "servers/docx"; hidden = @("converter") },
            @{ name = "pptx-tools";  entry = "servers/pptx/main.py";  paths = "servers/pptx"; hidden = @("converter") },
            @{ name = "csv-tools";   entry = "servers/csv/main.py";   paths = "servers/csv"; hidden = @("converter") },
            @{ name = "html-tools";  entry = "servers/html/main.py";  paths = "servers/html"; hidden = @("converter") },
            @{ name = "md-tools";    entry = "servers/md/main.py";    paths = "servers/md" },
            @{ name = "text-tools";  entry = "servers/text/main.py";  paths = "servers/text"; hidden = @("converter") },
            @{ name = "json-tools";  entry = "servers/json/main.py";  paths = "servers/json"; hidden = @("converter") }
          )
          foreach ($server in $servers) {
            $args = @("-m", "PyInstaller", "--clean", "--onefile", "--name", $server.name, "--paths", $server.paths, "--specpath", "build", "--workpath", "build", "--distpath", "dist")
            if ($server.ContainsKey("hidden")) {
              foreach ($hidden in $server.hidden) { $args += @("--hidden-import", $hidden) }
            }
            if ($server.ContainsKey("excludes")) {
              foreach ($exclude in $server.excludes) { $args += @("--exclude-module", $exclude) }
            }
            $args += $server.entry
            & $py @args
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          $platform = '${{ matrix.platform }}'
          $tag = '${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}'
          $suffix = if ($platform.StartsWith('windows-')) { '.exe' } else { '' }
          $out = Join-Path 'artifacts' $platform
          New-Item -ItemType Directory -Force $out | Out-Null
          $servers = @('excel-tools','pdf-tools','docx-tools','pptx-tools','csv-tools','html-tools','md-tools','text-tools','json-tools')
          foreach ($server in $servers) {
            $src = Join-Path 'dist' "$server$suffix"
            $dst = Join-Path $out "docloupe-mcp-$server-$platform$suffix"
            Copy-Item $src $dst
          }
          Get-ChildItem $out | Where-Object { -not $_.Name.EndsWith('sha256sums.txt') } | Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content (Join-Path $out "docloupe-mcp-$tag-$platform-sha256sums.txt")

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docloupe-mcp-${{ matrix.platform }}
          path: artifacts/${{ matrix.platform }}/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag != '' }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD | head -80)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -80)
          fi
          {
            echo "notes<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body: |
            # DocLoupe MCP ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

            Local-first MCP servers for reading, converting, and editing document formats.

            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ## Native Artifacts

            This release includes all server executables for:

            - `windows-x64` (`*.exe`)
            - `linux-x64`
            - `macos-x64`
            - `macos-arm64`

            Each platform has `docloupe-mcp-<server>-<platform>` binaries and a matching `docloupe-mcp-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}-<platform>-sha256sums.txt` checksum file.
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name, '-') }}

  npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: release
    timeout-minutes: 30
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate package metadata sync
        run: |
          node - <<'NODE'
          const pkg = require('./packages/npm/package.json');
          const server = require('./server.json');
          const mismatches = [];
          if (server.version !== pkg.version) mismatches.push(`server.version=${server.version} != package.version=${pkg.version}`);
          if (server.packages?.[0]?.identifier !== pkg.name) mismatches.push(`server package identifier=${server.packages?.[0]?.identifier} != package.name=${pkg.name}`);
          if (server.packages?.[0]?.version !== pkg.version) mismatches.push(`server package version=${server.packages?.[0]?.version} != package.version=${pkg.version}`);
          if (pkg.mcpName !== server.name) mismatches.push(`package mcpName=${pkg.mcpName} != server.name=${server.name}`);
          if (mismatches.length) {
            console.error('server.json is out of sync with packages/npm/package.json:');
            for (const mismatch of mismatches) console.error(`  ${mismatch}`);
            process.exit(1);
          }
          NODE

      - name: Check JavaScript
        working-directory: packages/npm
        run: npm run check


      - name: Dry-run npm pack
        working-directory: packages/npm
        run: npm pack --dry-run

      - name: Check npm package availability
        id: npm_status
        shell: bash
        run: |
          if npm view @ndhkaeru/docloupe-mcp@${RELEASE_TAG#v} version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish npm package
        if: steps.npm_status.outputs.exists != 'true' && env.HAS_NPM_TOKEN == 'true'
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          output=$(npm publish --access public 2>&1)
          status=$?
          set -e
          echo "$output"
          if [ "$status" -eq 0 ]; then exit 0; fi
          if grep -q 'Cannot publish over previously published version' <<<"$output"; then exit 0; fi
          exit "$status"

      - name: Skip existing npm package
        if: steps.npm_status.outputs.exists == 'true'
        run: echo '@ndhkaeru/docloupe-mcp@${{ env.RELEASE_TAG }} is already published; skipping npm publish.'

      - name: Fail without npm token
        if: steps.npm_status.outputs.exists != 'true' && env.HAS_NPM_TOKEN != 'true'
        run: |
          echo 'NPM_TOKEN is not configured; cannot publish @ndhkaeru/docloupe-mcp.' >&2
          exit 1
