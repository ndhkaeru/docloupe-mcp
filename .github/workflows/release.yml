name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.2.3'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release tests
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv-build
          .\.venv-build\Scripts\python.exe -m pip install -U pip
          .\.venv-build\Scripts\python.exe -m pip install pytest pyinstaller "mcp[cli]" openpyxl pillow pdfminer.six pdfplumber mammoth python-pptx markdownify beautifulsoup4 lxml defusedxml charset-normalizer

      - name: Run tests
        shell: pwsh
        run: .\.venv-build\Scripts\python.exe -m pytest -q

  build:
    name: Build ${{ matrix.platform }} executables
    needs: verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-13
            platform: macos-x64
          - os: macos-14
            platform: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m venv .venv-build
          $py = if (Test-Path ".venv-build/Scripts/python.exe") { ".venv-build/Scripts/python.exe" } else { ".venv-build/bin/python" }
          & $py -m pip install -U pip
          & $py -m pip install pytest pyinstaller "mcp[cli]" openpyxl pillow pdfminer.six pdfplumber mammoth python-pptx markdownify beautifulsoup4 lxml defusedxml charset-normalizer

      - name: Build all servers
        shell: pwsh
        run: |
          $py = if (Test-Path ".venv-build/Scripts/python.exe") { ".venv-build/Scripts/python.exe" } else { ".venv-build/bin/python" }
          $servers = @(
            @{ name = "excel-tools"; entry = "servers/excel/main.py"; paths = "servers/excel"; excludes = @("numpy", "lxml") },
            @{ name = "pdf-tools";   entry = "servers/pdf/main.py";   paths = "servers/pdf" },
            @{ name = "docx-tools";  entry = "servers/docx/main.py";  paths = "servers/docx" },
            @{ name = "pptx-tools";  entry = "servers/pptx/main.py";  paths = "servers/pptx" },
            @{ name = "csv-tools";   entry = "servers/csv/main.py";   paths = "servers/csv" },
            @{ name = "html-tools";  entry = "servers/html/main.py";  paths = "servers/html" },
            @{ name = "md-tools";    entry = "servers/md/main.py";    paths = "servers/md" },
            @{ name = "text-tools";  entry = "servers/text/main.py";  paths = "servers/text" },
            @{ name = "json-tools";  entry = "servers/json/main.py";  paths = "servers/json" }
          )
          foreach ($server in $servers) {
            $args = @("-m", "PyInstaller", "--clean", "--onefile", "--name", $server.name, "--paths", $server.paths, "--specpath", "build", "--workpath", "build", "--distpath", "dist")
            if ($server.ContainsKey("excludes")) {
              foreach ($exclude in $server.excludes) { $args += @("--exclude-module", $exclude) }
            }
            $args += $server.entry
            & $py @args
          }

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          $platform = '${{ matrix.platform }}'
          $tag = '${{ github.ref_name || inputs.tag }}'
          $suffix = if ($platform.StartsWith('windows-')) { '.exe' } else { '' }
          $out = Join-Path 'artifacts' $platform
          New-Item -ItemType Directory -Force $out | Out-Null
          $servers = @('excel-tools','pdf-tools','docx-tools','pptx-tools','csv-tools','html-tools','md-tools','text-tools','json-tools')
          foreach ($server in $servers) {
            $src = Join-Path 'dist' "$server$suffix"
            $dst = Join-Path $out "docforge-mcp-$server-$platform$suffix"
            Copy-Item $src $dst
          }
          Get-ChildItem $out | Where-Object { -not $_.Name.EndsWith('sha256sums.txt') } | Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content (Join-Path $out "docforge-mcp-$tag-$platform-sha256sums.txt")

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docforge-mcp-${{ matrix.platform }}
          path: artifacts/${{ matrix.platform }}/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') || inputs.tag != '' }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD | head -80)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" | head -80)
          fi
          {
            echo "notes<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name || inputs.tag }}
          tag_name: ${{ github.ref_name || inputs.tag }}
          body: |
            # DocForge MCP ${{ github.ref_name || inputs.tag }}

            Local-first MCP servers for reading, converting, and editing document formats.

            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ## Native Artifacts

            This release includes all server executables for:

            - `windows-x64` (`*.exe`)
            - `linux-x64`
            - `macos-x64`
            - `macos-arm64`

            Each platform has `docforge-mcp-<server>-<platform>` binaries and a matching `docforge-mcp-${{ github.ref_name || inputs.tag }}-<platform>-sha256sums.txt` checksum file.
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name || inputs.tag, '-') }}
