name: Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    env:
      HAS_SOURCE_OVERLAY: ${{ secrets.SOURCE_REPO != '' && secrets.SOURCE_REPO_TOKEN != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-15-intel
            platform: macos-x64
          - os: macos-14
            platform: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout source overlay
        if: env.HAS_SOURCE_OVERLAY == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          path: source-overlay

      - name: Apply source overlay
        if: env.HAS_SOURCE_OVERLAY == 'true'
        shell: pwsh
        run: Copy-Item -Recurse -Force source-overlay/servers/* servers/

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv-build
          $py = if (Test-Path ".venv-build/Scripts/python.exe") { ".venv-build/Scripts/python.exe" } else { ".venv-build/bin/python" }
          & $py -m pip install -U pip
          & $py -m pip install pytest pyinstaller "mcp[cli]" openpyxl pillow pdfminer.six pdfplumber mammoth python-pptx markdownify beautifulsoup4 lxml defusedxml charset-normalizer

      - name: Compile server entrypoints
        shell: pwsh
        run: |
          $py = if (Test-Path ".venv-build/Scripts/python.exe") { ".venv-build/Scripts/python.exe" } else { ".venv-build/bin/python" }
          $entries = Get-ChildItem servers -Recurse -Filter main.py | ForEach-Object { $_.FullName }
          & $py -m py_compile @entries

      - name: Run tests
        shell: pwsh
        run: |
          $py = if (Test-Path ".venv-build/Scripts/python.exe") { ".venv-build/Scripts/python.exe" } else { ".venv-build/bin/python" }
          & $py -m pytest -q

      - name: Build smoke test (text-tools)
        if: env.HAS_SOURCE_OVERLAY == 'true'
        shell: pwsh
        run: |
          $py = if (Test-Path ".venv-build/Scripts/python.exe") { ".venv-build/Scripts/python.exe" } else { ".venv-build/bin/python" }
          & $py -m PyInstaller --clean --onefile --name text-tools --paths servers/text --hidden-import converter --specpath build --workpath build --distpath dist servers/text/main.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
